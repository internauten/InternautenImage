name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${GITHUB_REF_NAME}"
            echo "Expected format: vX.X.X (example: v1.2.3)"
            exit 1
          fi

      - name: Build module ZIP
        run: |
          python3 - <<'PY'
          import os
          import zipfile

          module_dir = "internautenimage"
          tag = os.environ.get("GITHUB_REF_NAME", "untagged")
          out = f"internautenimage-module-{tag}.zip"

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              for base, _, files in os.walk(module_dir):
                  for name in files:
                      path = os.path.join(base, name)
                      arcname = os.path.relpath(path, ".")
                      zf.write(path, arcname)

          print(out)
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            internautenimage-module-${{ github.ref_name }}.zip
